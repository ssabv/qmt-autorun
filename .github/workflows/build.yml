name: Build EXE\n\non:\n  push:\n    branches: [ main ]\n  workflow_dispatch:\n\njobs:\n  build:\n    runs-on: windows-latest\n    steps:\n      - uses: actions/checkout@v4\n      - name: Install Python\n        uses: actions/setup-python@v5\n        with:\n          python-version: "3.10"\n      - name: Install deps\n        run: pip install -r requirements.txt pyinstaller\n      - name: Build\n        run: pyinstaller --onefile --console main.py\n      - name: Upload\n        uses: actions/upload-artifact@v4\n        with:\n          name: QMT-AutoLogin-EXE\n          path: dist/main.exe\n          retention-days: 2
