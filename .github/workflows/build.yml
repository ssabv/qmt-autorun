name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: pip install -r requirements.txt pyinstaller
      - name: Build
        run: pyinstaller --onefile --console main.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: QMT-AutoLogin-EXE
          path: dist/main.exe
          retention-days: 2
